name: job-search-frequent

on:
  schedule:
    # Every 30 minutes. GitHub may delay scheduled runs under load — expect
    # ~30-60 min in practice; that's fine for job freshness.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you run it on-demand from the Actions tab

# Both workflows write the same Sheet — never let them overlap.
concurrency:
  group: job-search-sheet
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Frequent search (Adzuna, Jooble, ATS boards)
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_KEY: ${{ secrets.JOOBLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PROFILE_BLURB: ${{ secrets.PROFILE_BLURB }}
        run: python main.py --mode frequent
