name: job-search-deep-crawl

on:
  schedule:
    # Every 6 hours (offset by 15 min so it doesn't collide with the :00/:30
    # frequent runs). Adds JSearch, whose free quota is ~200 calls/MONTH —
    # 4 runs/day keeps us well under it.
    - cron: "15 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: job-search-sheet
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Deep crawl (everything + JSearch / Google-for-Jobs)
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_KEY: ${{ secrets.JOOBLE_KEY }}
          JSEARCH_KEY: ${{ secrets.JSEARCH_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PROFILE_BLURB: ${{ secrets.PROFILE_BLURB }}
        run: python main.py --mode deep
